---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      copr:
        - scottames/ghostty
    install:
      install-weak-deps: false
      packages:
          - dolphin
          - dolphin-plugins
          - ark
          - spectacle
          - ghostty
          - kde-partitionmanager
          - kde-connect
          - plasma-systemsettings
          - plasma-systemmonitor
          - plasma-discover-kns
          - plasma-discover-notifier
          - plasma-discover-flatpak
          - plasma-discover
          - kinfocenter
          - input-remapper

  - type: script
    snippets:
        - "dnf -y copr disable scottames/ghostty"
        - "rm -rf /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:scottames:ghostty.repo"